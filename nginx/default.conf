# ============================================
# Nginx Reverse Proxy Configuration
# Routes traffic to frontend and backend
# ============================================
#
# NOTE: We do NOT use an 'upstream' block here.
# WHY? Nginx resolves upstream hostnames at STARTUP time.
# If the backend container isn't fully registered in Docker DNS
# when Nginx starts, it crashes with "host not found".
#
# Instead, we use a variable + Docker's DNS resolver (127.0.0.11).
# Variables are resolved at REQUEST time, not startup time.
# This is a common production pattern for Docker + Nginx.

server {
    listen 80;
    server_name _;

    # Docker's internal DNS resolver
    # 127.0.0.11 is Docker's embedded DNS server
    # It resolves service names (like 'api') to container IPs
    # 'valid=30s' caches the DNS result for 30 seconds
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ─────────────────────────────────────────
    # ROUTE 1: API Requests → Backend (Express)
    # ─────────────────────────────────────────
    location /api/ {
        # Using a variable forces Nginx to resolve at request time
        # instead of at startup. This prevents "host not found" errors.
        set $backend http://api:5000;
        proxy_pass $backend;

        # These headers tell Express the REAL client info:
        # Without these, Express sees Nginx's IP, not the user's IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────
    # ROUTE 2: WebSocket (Socket.io) → Backend
    # ─────────────────────────────────────────
    # Socket.io uses WebSocket, which requires special Nginx config.
    # WebSocket starts as an HTTP request, then "upgrades" to a
    # persistent bidirectional connection.
    location /socket.io/ {
        set $backend http://api:5000;
        proxy_pass $backend;

        # These two headers are THE critical part for WebSocket:
        # 'Upgrade' tells Nginx to upgrade HTTP → WebSocket
        # 'Connection "upgrade"' keeps the connection alive
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived, increase timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─────────────────────────────────────────
    # ROUTE 3: Everything Else → React Frontend
    # ─────────────────────────────────────────
    # Nginx serves static files 10x faster than Node.js
    location / {
        root /usr/share/nginx/html;

        # try_files: Critical for Single Page Apps (SPAs)
        # 1. Try the exact file ($uri)
        # 2. Try as directory ($uri/)
        # 3. Fall back to index.html (React Router handles routing)
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────
    # PERFORMANCE: Gzip Compression
    # ─────────────────────────────────────────
    # Compresses responses — 500KB JS → ~100KB after gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ─────────────────────────────────────────
    # SECURITY: Hide Nginx version
    # ─────────────────────────────────────────
    server_tokens off;
}
