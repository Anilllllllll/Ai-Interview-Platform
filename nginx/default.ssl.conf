# ============================================
# Nginx Configuration with HTTPS / SSL
# ============================================
# Replace nexainterview.space with your actual domain (e.g., nexa-interview.xyz)
# This file is used AFTER running init-ssl.sh to get certificates

server {
    # ─────────────────────────────────────────
    # HTTP → HTTPS Redirect (Port 80)
    # ─────────────────────────────────────────
    # ALL HTTP requests are redirected to HTTPS.
    # 'return 301' = permanent redirect (browsers cache this)
    # '$host' = preserves the domain name
    # '$request_uri' = preserves the path (/dashboard, /api/health, etc.)
    #
    # Example: http://nexa.com/login → https://nexa.com/login
    listen 80;
    server_name nexainterview.space;

    # Let's Encrypt certificate renewal verification
    # Certbot places challenge files here to prove you own the domain
    # This MUST stay on port 80 (HTTP) — it's part of the ACME protocol
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # ─────────────────────────────────────────
    # HTTPS (Port 443) — The main config
    # ─────────────────────────────────────────
    listen 443 ssl;
    server_name nexainterview.space;

    # ─────────────────────────────────────────
    # SSL CERTIFICATE FILES
    # ─────────────────────────────────────────
    # These are generated by Let's Encrypt / Certbot
    # fullchain.pem = your certificate + intermediate certificates
    # privkey.pem = your private key (NEVER share this)
    ssl_certificate /etc/letsencrypt/live/nexainterview.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexainterview.space/privkey.pem;

    # ─────────────────────────────────────────
    # SSL SECURITY SETTINGS
    # ─────────────────────────────────────────
    # These settings get an A+ on SSL Labs (ssllabs.com/ssltest)

    # Only allow TLS 1.2 and 1.3 (disable old insecure versions)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Use strong cipher suites only
    # Ciphers are the encryption algorithms used for the connection
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS: Tell browsers to ALWAYS use HTTPS for this domain
    # max-age=63072000 = 2 years. Once set, browsers refuse HTTP.
    # This prevents SSL stripping attacks.
    add_header Strict-Transport-Security "max-age=63072000" always;

    # SSL session caching — avoids repeating the TLS handshake
    # on every request. Improves performance significantly.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ─────────────────────────────────────────
    # ROUTE 1: API Requests → Backend
    # ─────────────────────────────────────────
    location /api/ {
        set $backend http://api:5000;
        proxy_pass $backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────
    # ROUTE 2: WebSocket (Socket.io) → Backend
    # ─────────────────────────────────────────
    location /socket.io/ {
        set $backend http://api:5000;
        proxy_pass $backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─────────────────────────────────────────
    # ROUTE 3: Frontend (React static files)
    # ─────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Security
    server_tokens off;
}
