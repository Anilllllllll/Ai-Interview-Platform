# ============================================
# AI Interview App - Docker Compose
# Orchestrates all services with one command
# ============================================

# 'services' defines all the containers that make up your application
# Each service = one container
services:

  # -------------------------------------------------
  # SERVICE 1: MongoDB (Database)
  # -------------------------------------------------
  mongo:
    image: mongo:7
    container_name: ai-interview-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "admin", "-p", "admin123", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # -------------------------------------------------
  # SERVICE 2: Backend API (Node.js)
  # -------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-interview-api

    # IMPORTANT: No 'ports' here!
    # The API is NOT exposed directly to the outside world anymore.
    # Only Nginx can reach it via Docker's internal network (api:5000).
    # This is a security best practice — reduce your attack surface.
    # If you need direct access for debugging, uncomment below:
    # ports:
    #   - "5000:5000"

    env_file:
      - ./backend/.env.docker
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # -------------------------------------------------
  # SERVICE 3: Nginx Reverse Proxy (NEW!)
  # -------------------------------------------------
  # Nginx sits in front of everything. It's the ONLY service
  # exposed to the outside world (port 80).
  # It routes:
  #   /api/*        → Express backend (api:5000)
  #   /socket.io/*  → Express backend (WebSocket)
  #   /*            → React frontend (static files)
  nginx:
    # Official Nginx image — alpine for small size (~40MB)
    image: nginx:alpine
    container_name: ai-interview-nginx

    # PORT 80: The standard HTTP port
    # Users visit http://localhost → Nginx handles everything
    # In production, you'd also map port 443 for HTTPS
    ports:
      - "80:80"

    # VOLUMES: Mount our config and frontend files into Nginx
    volumes:
      # 1. Our custom Nginx config replaces the default one
      #    ':ro' = read-only — Nginx only reads config, never writes it
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

      # 2. Frontend build files — Nginx serves these as static files
      #    You must run 'npm run build' in frontend/ first to create dist/
      - ./frontend/dist:/usr/share/nginx/html:ro

    # Nginx needs BOTH api and mongo to be running
    # (it proxies to api, which connects to mongo)
    depends_on:
      - api

    # HEALTH CHECK: Verify Nginx is responding
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    restart: unless-stopped

# -------------------------------------------------
# NAMED VOLUMES
# -------------------------------------------------
volumes:
  mongo-data:
    driver: local

