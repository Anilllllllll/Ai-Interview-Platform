# ============================================
# AI Interview App - Docker Compose (WITH SSL)
# ============================================
# USE THIS after running: ./scripts/init-ssl.sh
# This replaces docker-compose.yml when you have HTTPS

services:

  # -------------------------------------------------
  # SERVICE 1: MongoDB
  # -------------------------------------------------
  mongo:
    image: mongo:7
    container_name: ai-interview-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "admin", "-p", "admin123", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # -------------------------------------------------
  # SERVICE 2: Backend API
  # -------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-interview-api
    env_file:
      - ./backend/.env.docker
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # -------------------------------------------------
  # SERVICE 3: Nginx with SSL
  # -------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ai-interview-nginx
    ports:
      # Port 80: HTTP (redirects to HTTPS)
      - "80:80"
      # Port 443: HTTPS (the real traffic)
      - "443:443"
    volumes:
      # SSL Nginx config (replaces the HTTP-only config)
      - ./nginx/default.ssl.conf:/etc/nginx/conf.d/default.conf:ro

      # Frontend build files
      - ./frontend/dist:/usr/share/nginx/html:ro

      # SSL certificates from Let's Encrypt
      # Certbot stores certs here, Nginx reads them
      - ./certbot/conf:/etc/letsencrypt:ro

      # ACME challenge files for certificate renewal
      # Certbot writes challenge files here, Nginx serves them
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # -------------------------------------------------
  # SERVICE 4: Certbot (Certificate Auto-Renewal)
  # -------------------------------------------------
  # Let's Encrypt certificates expire every 90 days.
  # This container automatically renews them.
  #
  # HOW IT WORKS:
  # The 'entrypoint' command runs in a loop:
  #   1. 'certbot renew' checks if cert expires within 30 days
  #   2. If yes, renews it automatically
  #   3. Sleeps for 12 hours, then checks again
  #
  # Nginx picks up the new cert without restart because
  # the certificate files are on a shared volume.
  certbot:
    image: certbot/certbot
    container_name: ai-interview-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Run renewal check every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local
